name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution you'd like
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I also considered...

  - type: dropdown
    id: feature-type
    attributes:
      label: 📦 Feature Type
      options:
        - UI/UX Enhancement
        - New Functionality
        - Performance Improvement
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: ⚡ Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would be helpful
        - High - Needed for my use case
        - Critical - Blocking my work

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups/Examples
      description: Add any mockups, wireframes, or examples
      placeholder: Drag and drop images or provide links

  - type: textarea
    id: use-case
    attributes:
      label: 🎬 Use Case
      description: Describe how you would use this feature
      placeholder: I would use this feature to...

  - type: textarea
    id: benefits
    attributes:
      label: 📈 Benefits
      description: What benefits would this feature provide?
      placeholder: This would help by...

  - type: dropdown
    id: willing-to-contribute
    attributes:
      label: 🤝 Willing to Contribute?
      description: Are you willing to contribute to implementing this feature?
      options:
        - "Yes, I can submit a PR"
        - "Yes, with guidance"
        - "No, but I can help with testing"
        - "No"

  - type: textarea
    id: additional
    attributes:
      label: 📌 Additional Context
      description: Add any other context or screenshots about the feature request

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Checklist
      options:
        - label: I have searched for existing feature requests
          required: true
        - label: This feature aligns with the project's goals
          required: true
        - label: I have provided sufficient details
          required: true
